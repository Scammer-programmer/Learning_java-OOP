<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle}">Контакты поддержки</title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <img th:src="@{/images/logo.png}" alt="Logo" style="height: 40px; width: auto;">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">Help Desk</a>
        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/}">Главная</a>
            <a class="nav-link" th:href="@{/about}">О нас</a>
            <a class="nav-link active" th:href="@{/contacts}">Контакты</a>
            <a class="nav-link active" th:href="@{/faq}">FAQ</a>
            <a class="nav-link" href="/tickets">Заявки</a>
        </div>
    </div>
</nav>

<main class="container py-5">
    <h1 class="fw-bold mb-4" th:text="${pageTitle}">
        Контакты поддержки

    </h1>

    <div class="card shadow-sm mt-4">
        <div class="card-body">
            <h5 class="card-title">Каналы поддержки</h5>
            <ul>
                <li th:each="channel : ${channels}" th:text="${channel}"></li>
            </ul>
        </div>
    </div>
    <div class="alert alert-info mt-4" style="white-space: pre-line">Что указать в обращении:
        1. Тема
        2. Причина обращения
        3. Ваши контакты
        4. Денежное вознаграждение
    </div>

    <a class="btn btn-outline-primary" th:href="@{/}">
        Вернуться на главную
    </a>
</main>

<script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js">
</script>
</body>
</html>
